<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
  background: #000;
}

/* ===== Background Images ===== */
.bg-container {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  z-index: 0;
}

.bg {
  flex: 1;
  background-size: cover;
  background-position: center;
  opacity: 0.55;              /* More visible */
  filter: brightness(0.85)    /* Not too dark */
          contrast(1.05)
          blur(2px);
  animation: zoomSlow 20s infinite alternate ease-in-out;
}

/* CHANGE IMAGE NAMES IF NEEDED */
.bg-left {
  background-image: url('photo1.jpg');
}

.bg-right {
  background-image: url('photo2.jpg');
}

@keyframes zoomSlow {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

/* Soft overlay (lighter than before) */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.35); /* Balanced darkness */
  z-index: 1;
}

/* ===== Card ===== */
.card {
  position: relative;
  z-index: 2;
  background: rgba(255, 255, 255, 0.18);
  padding: 40px;
  border-radius: 25px;
  backdrop-filter: blur(18px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  text-align: center;
  width: 90%;
  max-width: 420px;
  animation: fadeIn 1.5s ease-in-out;
  color: white;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

h1 {
  font-size: 26px;
  margin-bottom: 30px;
  color: #ffd6e0;
}

/* ===== Buttons ===== */
.buttons {
  position: relative;
  height: 100px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  position: absolute;
}

#yesBtn {
  background: #ff4d6d;
  color: white;
  left: 15%;
}

#yesBtn:hover {
  transform: scale(1.15);
  background: #ff1e4d;
}

#noBtn {
  background: #f5f5f5;
  color: black;
  right: 15%;
}

#message {
  margin-top: 25px;
  font-size: 18px;
  font-weight: bold;
  color: #ffe3ec;
}

/* Floating hearts */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 4s linear infinite;
  opacity: 0.9;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

@media(max-width: 500px) {
  h1 {
    font-size: 22px;
  }
}

</style>
</head>

<body>

<div class="bg-container">
  <div class="bg bg-left"></div>
  <div class="bg bg-right"></div>
</div>

<div class="overlay"></div>

<div class="card">
  <h1>Will you be my Valentine? ❤️</h1>

  <div class="buttons">
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 🙈</button>
  </div>

  <div id="message"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

yesBtn.addEventListener("click", () => {
  message.innerHTML = "YAYYYY 😍❤️ Happy Valentine's Day my forever person 💕✨";
  createHearts();
});

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * 250;
  const y = Math.random() * 80;
  noBtn.style.right = "auto";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

noBtn.addEventListener("click", () => {
  message.innerHTML = "Nice try 😏 But the only valid answer is YES 💘";
});

function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 4000);
  }, 250);
}
</script>

</body>
</html>
